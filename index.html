<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dahae Go — Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.09);
    }

    .nav-brand {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: #111;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .nav-links a,
    .nav-links button {
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-decoration: none;
      color: #111;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .nav-links a:hover,
    .nav-links button:hover { opacity: 0.45; }

    /* ── GRID VIEW ───────────────────────────────────── */
    #view-grid {
      padding-top: 44px;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .masonry-col {}

    #col-left { border-right: 1px solid rgba(0,0,0,0.08); }

    /* Project card */
    .project-card {
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-img {
      line-height: 0;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .project-card:hover .card-img img { transform: scale(1.03); }

    /* ── ALTERNATING HEIGHTS ─────────────────────────────
       Left col:  tall → short → tall → short …
       Right col: short → tall → short → tall …
       Creates the staggered visual rhythm.
    ──────────────────────────────────────────────────── */
    .project-card.tall  .card-img img { aspect-ratio: 5 / 6; }
    .project-card.short .card-img img { aspect-ratio: 16 / 9; }

    .card-meta {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 9px 16px 11px;
    }

    .pm-num  { font-size: 10px; color: #bbb; letter-spacing: 0.05em; min-width: 18px; }
    .pm-name { font-size: 11.5px; font-weight: 500; letter-spacing: 0.04em; color: #111; }
    .pm-date { font-size: 10.5px; color: #bbb; }
    .pm-cat  { margin-left: auto; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #ccc; }

    /* ── DETAIL VIEW ─────────────────────────────────── */
    #view-detail {
      display: none;
      position: fixed;
      inset: 44px 0 0 0;
      z-index: 200;
    }

    #view-detail.open { display: flex; }

    .detail-left {
      width: 50%;
      flex-shrink: 0;
      overflow: hidden;
      background: #e8e8e6;
      position: relative;
    }

    .detail-left img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.08;
    }

    .detail-right {
      width: 50%;
      height: 100%;
      overflow-y: auto;
      border-left: 1px solid rgba(0,0,0,0.08);
      background: #fff;
    }

    .detail-right::-webkit-scrollbar { display: none; }

    /* Detail header (text block) */
    .detail-header {
      padding: 28px 20px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .dh-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .dh-num   { font-size: 10px; color: #bbb; letter-spacing: 0.1em; margin-bottom: 4px; }
    .dh-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; color: #111; }
    .dh-cat   { font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #bbb; padding-top: 3px; }

    .dh-desc {
      font-size: 11.5px;
      line-height: 1.85;
      color: #555;
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }

    .dh-meta {
      display: flex;
      border-top: 1px solid rgba(0,0,0,0.07);
      padding-top: 14px;
    }

    .dh-meta-cell { flex: 1; padding-right: 10px; }
    .dh-meta-cell + .dh-meta-cell { padding-left: 10px; border-left: 1px solid rgba(0,0,0,0.07); }

    .dm-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 4px;
    }

    .dm-value {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #333;
      line-height: 1.5;
    }

    .detail-img-wrap {
      line-height: 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .detail-img-wrap img {
      width: 100%;
      display: block;
    }

    /* ── FOOTER ──────────────────────────────────────── */
    footer {
      padding: 14px 20px;
      font-size: 9.5px;
      color: #bbb;
      letter-spacing: 0.07em;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <button class="nav-brand" onclick="closeDetail()">Dahae Go</button>
    <div class="nav-links" id="nav-default">
      <a href="#">Information</a>
      <a href="#">Instagram</a>
      <a href="mailto:gdh3997@gmail.com">Email</a>
    </div>
    <div class="nav-links" id="nav-detail" style="display:none">
      <span id="nav-detail-label" style="font-size:11px;letter-spacing:0.08em;"></span>
      <button onclick="closeDetail()">(Close)</button>
    </div>
  </nav>

  <!-- GRID VIEW -->
  <div id="view-grid">
    <div class="masonry-col" id="col-left"></div>
    <div class="masonry-col" id="col-right"></div>
  </div>
  <footer id="footer">All Rights Reserved © 2026</footer>

  <!-- DETAIL VIEW -->
  <div id="view-detail">
    <div class="detail-left">
      <img id="detail-hero-img" src="" alt="">
    </div>
    <div class="detail-right" id="detail-right"></div>
  </div>

  <script>
    /* ══════════════════════════════════════════════════════════════════
       PROJECT DATA
       data/projects.json 에서 불러옴 (빌더의 Publish 버튼이 이 파일을 갱신함)
    ══════════════════════════════════════════════════════════════════ */
    let PROJECTS = [];

    /* ══════════════════════════════════════════════════════════════════
       RENDER MASONRY GRID
       각 프로젝트의 이미지 2장을 각각 독립 카드로 만들어
       좌·우 컬럼에 교차 배치합니다.

       프로젝트 i가 짝수이면  → img1: 왼쪽(tall), img2: 오른쪽(short)
       프로젝트 i가 홀수이면  → img1: 오른쪽(tall), img2: 왼쪽(short)

       결과적으로 두 컬럼 모두 tall/short가 교차하는 마소너리 패턴이 됩니다.
    ══════════════════════════════════════════════════════════════════ */
    function renderGrid() {
      const leftCol  = document.getElementById('col-left');
      const rightCol = document.getElementById('col-right');
      leftCol.innerHTML  = '';
      rightCol.innerHTML = '';

      // 컬럼별 카드 배열 수집
      const leftCards  = [];
      const rightCards = [];

      PROJECTS.forEach((p, i) => {
        const primaryLeft = i % 2 === 0;   // 짝수 프로젝트는 img1이 왼쪽

        // img1 (메인 이미지 + 라벨)
        leftCards.push(  primaryLeft  ? { p, src: p.detail[0], label: true  } : null);
        rightCards.push(!primaryLeft  ? { p, src: p.detail[0], label: true  } : null);

        // img2 (보조 이미지, 라벨 없음) — detail[1] 없으면 detail[0] 재사용
        const src2 = p.detail[1] || p.detail[0];
        leftCards.push(  primaryLeft  ? null : { p, src: src2, label: false } );
        rightCards.push(!primaryLeft  ? null : { p, src: src2, label: false } );
      });

      // null 제거 후 컬럼에 카드 생성
      // 왼쪽: tall, short, tall, short…
      // 오른쪽: short, tall, short, tall… (반대 위상)
      function buildCol(col, items, startTall) {
        let heightIdx = 0;
        items.filter(Boolean).forEach(item => {
          const isTall = startTall ? heightIdx % 2 === 0 : heightIdx % 2 !== 0;
          heightIdx++;

          const card = document.createElement('div');
          card.className = `project-card ${isTall ? 'tall' : 'short'}`;
          card.innerHTML = `
            <div class="card-img">
              <img src="${item.src}" alt="${item.p.name}">
            </div>
            ${item.label ? `
            <div class="card-meta">
              <span class="pm-num">${item.p.num}</span>
              <span class="pm-name">${item.p.name}</span>
              <span class="pm-date">${item.p.date}</span>
              <span class="pm-cat">${item.p.category}</span>
            </div>` : ''}
          `;
          card.addEventListener('click', () => openDetail(item.p));
          col.appendChild(card);
        });
      }

      buildCol(leftCol,  leftCards,  true);   // 왼쪽: tall 시작
      buildCol(rightCol, rightCards, false);  // 오른쪽: short 시작
    }

    /* ══════════════════════════════════════════════════════════════════
       OPEN DETAIL
    ══════════════════════════════════════════════════════════════════ */
    function openDetail(project) {
      document.getElementById('nav-default').style.display = 'none';
      document.getElementById('nav-detail').style.display  = 'flex';
      document.getElementById('nav-detail-label').textContent = `${project.num}  ${project.name}`;

      document.getElementById('detail-hero-img').src = project.hero;

      const dr = document.getElementById('detail-right');
      dr.innerHTML = `
        <div class="detail-header">
          <div class="dh-top">
            <div>
              <div class="dh-num">${project.num}</div>
              <div class="dh-title">${project.name}</div>
            </div>
            <div class="dh-cat">${project.category}</div>
          </div>
          <p class="dh-desc">${project.desc}</p>
          <div class="dh-meta">
            <div class="dh-meta-cell">
              <div class="dm-label">Client</div>
              <div class="dm-value">${project.client}</div>
            </div>
            <div class="dh-meta-cell">
              <div class="dm-label">Scope</div>
              <div class="dm-value">${project.scope}</div>
            </div>
            <div class="dh-meta-cell">
              <div class="dm-label">Date</div>
              <div class="dm-value">${project.date}</div>
            </div>
            <div class="dh-meta-cell">
              <div class="dm-label">Contribution</div>
              <div class="dm-value">${project.contribution}</div>
            </div>
          </div>
        </div>
        ${project.detail.map(src =>
          `<div class="detail-img-wrap"><img src="${src}" alt="" loading="lazy"></div>`
        ).join('')}
      `;

      dr.scrollTop = 0;
      document.getElementById('view-detail').classList.add('open');
      document.getElementById('view-grid').style.visibility   = 'hidden';
      document.getElementById('footer').style.visibility      = 'hidden';
      document.body.style.overflow = 'hidden';
    }

    /* ══════════════════════════════════════════════════════════════════
       CLOSE DETAIL
    ══════════════════════════════════════════════════════════════════ */
    function closeDetail() {
      document.getElementById('nav-default').style.display = 'flex';
      document.getElementById('nav-detail').style.display  = 'none';
      document.getElementById('view-detail').classList.remove('open');
      document.getElementById('view-grid').style.visibility  = 'visible';
      document.getElementById('footer').style.visibility     = 'visible';
      document.body.style.overflow = '';
    }

    fetch('./data/projects.json')
      .then(r => r.json())
      .then(data => {
        PROJECTS = data.map(p => ({ ...p, hero: p.detail[0] }));
        renderGrid();
      });
  </script>
</body>
</html>
